services:
  postgres:
    build:
      context: ../../crates/tensorzero-core/tests/e2e
      dockerfile: Dockerfile.postgres
    image: tensorzero/postgres-dev:14-trixie-slim
    environment:
      POSTGRES_DB: tensorzero-load-test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    command: ["postgres", "-c", "cron.database_name=tensorzero-load-test"]
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tensorzero-load-test"]
      start_period: 30s
      start_interval: 1s
      timeout: 1s
